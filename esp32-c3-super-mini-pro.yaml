esphome:
  name: outdoor-node-c3
  platformio_options:
    build_flags:
      - -DARDUINO_USB_CDC_ON_BOOT=1
      - -DARDUINO_USB_MODE=1
  on_boot:
    priority: 300
    then:
      - script.execute: triple_blink
      - delay: 200ms # Give some time for the script to finish completely
      - switch.turn_off: c3_led_pin # Ensure LED is off after boot blink
      - lambda: |-
          ESP_LOGI("custom", "Peer MAC: F0:F5:BD:76:1F:A0");
          ESP_LOGI("custom", "Channel: 10");

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:
  level: DEBUG

espnow:
  channel: 10
  peers:
    - "F0:F5:BD:76:1F:A0"
  on_receive:
    - logger.log:
        format: 'Received "%s" from %s: RSSI: %ddBm'
        args:
          - data
          - format_mac_address_pretty(info.src_addr).c_str()
          - info.rx_ctrl->rssi
    - lambda: |-
        const char * command = (const char *)data;
        if (strlen(command) > 0 && command[0] == '0') {
          id(c3_led_pin).turn_on();
        } else if (strlen(command) > 0 && command[0] == '.') {
          id(c3_led_pin).turn_off();
        }

switch:
  - platform: gpio
    pin:
      number: GPIO8
      inverted: true
    id: c3_led_pin
    name: "C3 LED"

packet_transport:
  - platform: espnow
    peer_address: "F0:F5:BD:76:1F:A0"
    sensors:
      - temperature

sensor:
  - platform: template
    name: "Temperature"
    id: temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 15s
    lambda: |-
      return (float)esp_random() / 4294967295.0 * (30.0 - 16.0) + 16.0;

script:
  - id: triple_blink
    then:
      - repeat:
          count: 3
          then:
            - switch.turn_on: c3_led_pin
            - delay: 100ms
            - switch.turn_off: c3_led_pin
            - delay: 100ms