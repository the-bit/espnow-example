substitutions:
  # Device metadata
  node_name: "lolin-s3-mini-pro" # ${node_name}
  friendly_name: "Bedroom Control Hub" # ${friendly_name}
  
  # Sensor settings
  gyro_name: "Lolin IMU"
  gyro_id: "qmi_sensor"
  update_interval: "20s" # ${update_interval}
  # Offset to compensate for internal ESP32 heating
  temp_offset: "-3.0"

  # Font sizes
  font_size_huge: "76"    # New big font for temperature
  font_size_large: "72"   # Original size
  font_size_medium: "22"  # ~70% of original
  font_size_small: "16"   # ~50% of original (for OK/RDY)  

globals:
  - id: c3_led_status_internal
    type: bool
    restore_value: yes # Store C3 led state and set its initial value
    initial_value: 'false'

# External component with explicit branch reference
external_components:
  - source: github://Djelibeybi/esphome-qmi8658@main
    components: [ qmi8658 ]

# The main QMI8658 component
qmi8658:
  id: imu_sensor # Required, can be any valid ID (e.g., imu, my_sensor)
  address: 0x6B # Optional, 0x6B is default
  update_interval: ${update_interval}

  # Range and ODR configuration (all optional)
  # accel_range: 2G # Options: 2G, 4G, 8G, 16G
  # gyro_range: 2048DPS # Options: 16DPS, 32DPS, 64DPS, 128DPS, 256DPS, 512DPS, 1024DPS, 2048DPS
  # accel_odr: 500HZ # Options: 8000HZ, 4000HZ, 2000HZ, 1000HZ, 500HZ, 250HZ, 125HZ, 62.5HZ, 31.25HZ
  # gyro_odr: 500HZ # Options: 8000HZ, 4000HZ, 2000HZ, 1000HZ, 500HZ, 250HZ, 125HZ, 62.5HZ, 31.25HZ

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - -DARDUINO_USB_CDC_ON_BOOT=1
      - -DARDUINO_USB_MODE=1

  on_boot:
    # Changed to 100 to run after most hardware is ready but before heavy WiFi
    priority: 100 
    then:
      # 1. Force LED power off-on to clear any hardware glitches
      - switch.turn_off: pwr_switch
      - delay: 100ms
      - switch.turn_on: pwr_switch
      - delay: 200ms
      
      # 3. Initialize display with a small delay to avoid SPI bus congestion
      - delay: 3s
      - light.turn_on:
          id: tft_backlight
          brightness: 75%
          transition_length: 1s
      
      # 4. Final step: Send IR command to AC
      # Added delay to ensure remote_transmitter is fully stable
      - delay: 2s
      - switch.turn_on: ac_display_light

esp32:
  board: lolin_s3_mini_pro
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: DEBUG

network:
  enable_ipv6: false

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
  - platform: web_server

web_server:
  port: 80
  version: 3

output:
  - platform: ledc
    pin: 33
    id: backlight_pwm_out

light:
  - platform: monochromatic
    output: backlight_pwm_out
    name: "TFT Backlight"
    id: tft_backlight
    restore_mode: ALWAYS_ON
  - platform: esp32_rmt_led_strip
    # Pin 8 for Lolin S3 Mini Pro
    pin: 8
    num_leds: 1
    id: onboard_rgb
    name: "Onboard RGB LED"
    rgb_order: RGB
    rmt_symbols: 64
    chipset: WS2812
    # Setting transition to 0s to avoid RMT timing conflicts during updates
    default_transition_length: 0s
    restore_mode: ALWAYS_OFF
    gamma_correct: 1.0

spi:
  clk_pin: 40
  mosi_pin: 38

i2c:
  sda: 12
  scl: 11
  scan: true

binary_sensor:
  - platform: status
    id: api_connected
  - platform: gpio
    pin: {number: 0, inverted: true, mode: INPUT_PULLUP}
    name: "Hardware Blue Key"
  - platform: gpio
    pin: {number: 47, inverted: true, mode: INPUT_PULLUP}
    name: "Hardware Red Key"
  - platform: gpio
    pin: {number: 48, inverted: true, mode: INPUT_PULLUP}
    name: "Hardware Green Key"

font:
  - file: "gfonts://Roboto"
    id: font_huge
    size: ${font_size_huge}
    glyphs: '% .0123456789°C'

  - file: "gfonts://Roboto"
    id: font_large
    size: ${font_size_large}
    glyphs: '% .0123456789°C'

  - file: "gfonts://Roboto"
    id: font_small
    size: ${font_size_small}
    glyphs: '0123456789. °:-!%ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz'

display:
  - platform: st7735
    model: "INITR_GREENTAB"
    id: pro_display
    device_width: 128
    device_height: 128
    cs_pin: 35
    dc_pin: 36
    reset_pin: 34
    row_start: 1
    col_start: 2
    rotation: 270
    eight_bit_color: true
    invert_colors: true
    lambda: |-
      const uint32_t text_interval = 10000; 
      const uint32_t color_period = 30000;  
      
      uint32_t now = millis();
      // Base progress (0.0 to 1.0)
      float p_bottom = (float)(now % color_period) / (float)color_period;
      // Phase shift for top line: advance by 33.3%
      float p_top = p_bottom + 0.333f;
      if (p_top > 1.0f) p_top -= 1.0f;

      auto get_rainbow = [](float p) -> Color {
        float r = 0, g = 0, b = 0;
        if (p < 0.333f) {
          float ph = p / 0.333f; r = 1.0f - ph; g = ph; b = 0.0f;
        } else if (p < 0.666f) {
          float ph = (p - 0.333f) / 0.333f; r = 0.0f; g = 1.0f - ph; b = ph;
        } else {
          float ph = (p - 0.666f) / 0.334f; r = ph; g = 0.0f; b = 1.0f - ph;
        }
        return Color((int)(r * 255), (int)(g * 255), (int)(b * 255));
      };

      // --- DRAWING ---
      it.fill(Color(0, 0, 0));

      // 1. DUAL LINES (Top and Bottom)
      it.filled_rectangle(2, 0, 124, 2, get_rainbow(p_top));
      it.filled_rectangle(2, 126, 124, 2, get_rainbow(p_bottom));

      // 2. STATUS (Y=5)
      if (id(api_connected).has_state() && id(api_connected).state) {
        it.printf(126, 5, id(font_small), TextAlign::TOP_RIGHT, "RDY");
      } else {
        it.printf(126, 5, id(font_small), TextAlign::TOP_RIGHT, "OK");
      }
      if (!std::isnan(id(lolin_chip_temperature).state)) {
        it.printf(2, 5, id(font_small), TextAlign::TOP_LEFT, "%.0f°", id(lolin_chip_temperature).state);
      }

      // 3. MAIN DATA (Centered at X=64, Y=72)
      bool show_humidity = (now / text_interval) % 2;
      if (show_humidity) {
        if (!std::isnan(id(bedroom_humidity).state)) {
          // Use Font Large (72px) for Humidity
          it.printf(64, 72, id(font_large), TextAlign::CENTER, "%.0f%%", id(bedroom_humidity).state);
        }
      } else {
        if (!std::isnan(id(bedroom_temperature).state)) {
          // Use Font Huge (76px) for Temperature
          it.printf(64, 72, id(font_huge), TextAlign::CENTER, "%.0f°", id(bedroom_temperature).state);
        }
      }

remote_transmitter:
  pin: 9
  carrier_duty_percent: 50%
  id: ir_transmitter
  rmt_symbols: 64
  # Trigger blinks on any IR transmission
  on_transmit:
    then:
      - logger.log: "No script on IR transmit"

switch:
  - platform: gpio
    pin: 7
    name: "RGB Power"
    id: pwr_switch
    restore_mode: ALWAYS_ON
  - platform: gree
    gree_id: tadiran_ac
    light:
      name: "AC Display Light"
      id: ac_display_light
  - platform: template
    name: "C3 LED Control"
    id: c3_led_control
    lambda: |-
      return id(c3_led_status_internal);
    
    turn_on_action:
      - globals.set:
          id: c3_led_status_internal
          value: 'true'
      - espnow.send:
          address: !secret c3_mac_address
          data: !lambda |-
            std::string data = "0" ;
            unsigned char* buffer = (unsigned char*)data.c_str();
            return std::vector<unsigned char>(buffer, buffer + data.length());
          
    turn_off_action:
      - globals.set:
          id: c3_led_status_internal
          value: 'false'
      - espnow.send:
          address: !secret c3_mac_address
          data: !lambda |-
            std::string data = "." ;
            unsigned char* buffer = (unsigned char*)data.c_str();
            return std::vector<unsigned char>(buffer, buffer + data.length());

climate:
  - platform: gree
    name: "Bedroom AC"
    id: tadiran_ac
    transmitter_id: ir_transmitter
    # model: yac1fb9
    # model: yac
    # valid options are 'generic', 'yan', 'yaa', 'yac', 'yac1fb9', 'yx1ff', 'yag'
    # Gree switches are only supported for the yaa, yac, yan, yac1fb9 models
    model: 'yan'
    sensor: bedroom_temperature

# Cleaned ESP-NOW section
espnow:

  on_receive:
    # - script.execute: blink_green_rx # Blink green on data receive
    - logger.log:
        format: 'Received temperature %.1f°C from %s: RSSI: %ddBm'
        args:
          - id(outdoor_temperature).state
          - format_mac_address_pretty(info.src_addr).c_str()
          - info.rx_ctrl->rssi
  peers:
    - !secret c3_mac_address

packet_transport:
  - platform: espnow
    providers:
      - name: outdoor-node-c3

sensor:
  - platform: dht
    pin: 37 # Replace with your actual data pin
    model: DHT22
    temperature:
      name: "Bedroom Temperature" # Exposed to HA
      id: bedroom_temperature
    humidity:
      name: "Bedroom Humidity" # Exposed to HA
      id: bedroom_humidity
    update_interval: 20s # DHT22 is slow, don't poll faster than 2s

  # - platform: homeassistant
  #   name: "Bedroom Indoor Temperature"
  #   entity_id: sensor.bedroom_temperature
  #   id: bedroom_temperature

  # Only one external sensor now
  - platform: packet_transport
    id: outdoor_temperature
    provider: outdoor-node-c3
    remote_id: DS1280
    name: "Outdoor Temperature"
    internal: false
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
  
  - platform: qmi8658
    qmi8658_id: imu_sensor # Reference to the component

    # Temperature (°C)
    temperature:
      name: "${gyro_name} Temperature"
      id: "lolin_chip_temperature"
      accuracy_decimals: 1
      filters:
        - offset: ${temp_offset}

    # Accelerometer outputs (m/s²)
    # accel_x:
    #   name: "Accelerometer X"
    # accel_y:
    #   name: "Accelerometer Y"
    # accel_z:
    #   name: "Accelerometer Z"

    # Gyroscope outputs (°/s)
    # gyro_x:
    #   name: "Gyroscope X"
    # gyro_y:
    #   name: "Gyroscope Y"
    # gyro_z:
    #   name: "Gyroscope Z"

    # Tilt angles (degrees)
    # pitch:
    #   name: "Pitch"
    # roll:
    #   name: "Roll"
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    update_interval: 10s

text_sensor:
  - platform: wifi_info
    id: wifi_info
